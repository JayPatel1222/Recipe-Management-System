      <nav class="navbar navbar-expand-lg navbar-ligh ">

          <img
            src="img/website-logo.png"

            height="40"
            class="d-inline-block align-top"
            alt=""
          />
        </a>
        <a class="navbar-brand" href="login.html">The Recipe Town</a>
        <button
          class="navbar-toggler"
          type="button"
          data-toggle="collapse"
          data-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="create-recipe.html">Create Recipe</a>
            </li>
            <li class="nav-item">

          </ul>

    <div class="container py-5">
      <div>
        <h1>Manage Categories</h1>
        <h3>Add New Category</h3>
      </div>

      <form class="row">
        <div class="col-md-6">
          <div class="mb-3">
            <label class="form-label">Category Name: </label>
            <input class="form-control" type="text" />
          </div>

          <div class="mb-3">
            <label class="form-label">Instructions: </label>
            <textarea
              rows="4"
              class="form-control"
              placeholder="Type here... "
            ></textarea>
          </div>

          <div class="mb-3">
            <button class="btn btn-primary" type="submit">Create Recipe</button>
          </div>
        </div>
      </form>

    <footer>
