<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
     <link rel="stylesheet" href="css/styles.css">
    <title>Create Recipe</title>
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-light">
        <a class="navbar-brand" href="login.html">
          <img
            src="img/website-logo.png"
            width="40"
            height="40"
            class="d-inline-block align-top"
            alt=""
          />
        </a>
        <a class="navbar-brand" href="login.html">The Recipe Town</a>
        <button
          class="navbar-toggler"
          type="button"
          data-toggle="collapse"
          data-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="create-recipe.html">Create Recipe</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="manage-categories.html">Manage Categories</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="manage-ingredients.html">Manage Ingredient</a>
            </li>
          </ul>
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="login.html">Register</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="login.html">Login</a>
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <div class="container">
      <div>
        <h1>Create Recipe</h1>
      </div>

      <form>
        <div class="row">
          <div class="col-md-6">
            <div class="mb-3">
              <label class="form-label">Category</label>
              <select class="form-control">
                <option selected>Select Category</option>
                <option>Breakfast</option>
                <option>Lunch</option>
                <option>Dinner</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Recipe Name</label>
              <input class="form-control" type="text" />
            </div>

            <div class="mb-3">
              <label class="form-label">Ingredient type</label>
              <select class="form-control">
                <option selected>Select type</option>
                <option>Grain</option>
                <option>Dairy</option>
                <option>Produce</option>
              </select>
              <label class="form-label">Ingredient</label>
              <select class="form-control">
                <option selected>Select</option>
                <option>Bread</option>
                <option>Milk</option>
                <option>Tomato</option>
              </select>
            </div>

            <div class="mb-3">
              <textarea
                rows="3"
                class="form-control"
                placeholder="Added Ingredients show here"
              ></textarea>
            </div>
          </div>

          <div class="col-md-6">
            <div class="mb-3">
              <label class="form-label">Instructions: </label>
              <textarea
                rows="4"
                class="form-control"
                placeholder="Type here... "
              ></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">Tips:</label>
              <textarea
                class="form-control"
                placeholder="Type here..."
              ></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">Prep time:</label>
              <input class="form-control" type="number" />

              <label class="form-label">Cook time:</label>
              <input class="form-control" type="number" />
            </div>
          </div>
        </div>
        <div class="mb-3">
          <button class="btn btn-primary" type="submit">Create Recipe</button>
        </div>
      </form>
    </div>
    <footer>
      <div class="text-center p-3" >
        © 2025 Copyright:
        <a class="text-reset fw-bold" href="login.html"
          >The Recipe Town</a>
      </div>
    </footer>
  </body>
</html>
