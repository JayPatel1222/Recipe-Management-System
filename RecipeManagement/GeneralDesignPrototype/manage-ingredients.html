    <meta charset="UTF-8" />

      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css">
  </head>

  <body>
   <header>
      <nav class="navbar navbar-expand-lg navbar-light ">
        <a class="navbar-brand" href="login.html">
          <img
            src="img/website-logo.png"
            width="40"
            height="40"
            class="d-inline-block align-top"
            alt=""
          />
        </a>
        <a class="navbar-brand" href="login.html">The Recipe Town</a>
        <button
          class="navbar-toggler"
          type="button"
          data-toggle="collapse"
          data-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="create-recipe.html">Create Recipe</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="manage-categories.html">Manage Categories</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="manage-ingredients.html">Manage Ingredient</a>
            </li>
          </ul>
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="login.html">Register</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="login.html">Login</a>
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <div class="container py-5">
        
            <h1 class="mb-5">Manage Ingredients</h1>

            <h3 class="mt-4 mb-4">Add new Ingredient</h3>
      
      
      <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-6">
          <form>
            <div class="mb-3">
              <label for="ingredientName" class="form-label fs-5"
                >Ingredient Name:</label
              >
              <input
                type="text"
                class="form-control form-control-lg fs-6"
                placeholder="Type here..."
                required
              />
            </div>

            <div class="mb-3">
              <label for="ingredientType" class="form-label fs-5"
                >Ingredient Type:</label
              >
              <input
                type="text"
                class="form-control form-control-lg fs-6"
                placeholder="Type here..."
                required
              />
            </div>

            <div class="mb-4">
              <label for="details" class="form-label fs-5"
                >Details (Optional):</label
              >
              <textarea
                class="form-control"
                id="details"
                rows="6"
                placeholder="Type here..."
              ></textarea>
            </div>

            <div class="d-flex justify-content-center justify-content-md-start">
              <button type="submit" class="btn btn-primary btn-lg px-5">
                Add Ingredient
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <footer>
      <div class="text-center p-3" >
        © 2025 Copyright:
        <a class="text-reset fw-bold" href="login.html"
          >The Recipe Town</a>
      </div>
    </footer>
  </body>
