<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-light">
        <a class="navbar-brand" href="login.html">
          <img
            src="img/website-logo.png"
            width="40"
            height="40"
            class="d-inline-block align-top"
            alt=""
          />
        </a>
        <a class="navbar-brand" href="login.html">The Recipe Town</a>
        <button
          class="navbar-toggler"
          type="button"
          data-toggle="collapse"
          data-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="create-recipe.html">Create Recipe</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="manage-categories.html"
                >Manage Categories</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="manage-ingredients.html"
                >Manage Ingredient</a
              >
            </li>
          </ul>
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="login.html">Register</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="login.html">Login</a>
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main class="d-flex justify-content-center align-items-center">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-6 p-5 bg-white">
            <h1 class="text-center mb-5 fs-1">LOGIN</h1>
            <form>
              <div class="mb-3">
                <label for="username" class="form-label fs-5">USERNAME</label>
                <input
                  type="text"
                  class="form-control form-control-lg"
                  id="username"
                  placeholder="Enter your username"
                />
              </div>

              <div class="mb-3">
                <label for="password" class="form-label fs-5">PASSWORD</label>
                <input
                  type="password"
                  class="form-control form-control-lg"
                  id="password"
                  placeholder="Enter your password"
                />
              </div>

              <div class="mb-3 text-start">
                <a href="#" class="fs-6">FORGOT PASSWORD</a>
              </div>

              <div class="d-flex flex-column flex-md-row gap-2">
                <button
                  type="submit"
                  class="btn btn-secondary btn-lg w-100 w-md-50"
                >
                  LOGIN
                </button>
                <button
                  type="button"
                  class="btn btn-secondary btn-lg w-100 w-md-50"
                >
                  REGISTER
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <div
        class="text-center p-3">
        © 2025 Copyright:
        <a class="text-reset fw-bold" href="login.html">The Recipe Town</a>
      </div>
    </footer>
  </body>
</html>
